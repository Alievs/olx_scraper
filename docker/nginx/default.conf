server {
    listen 80;
    server_name _;
    root /var/www/html/public;
    index index.php;

    # Docker embedded DNS; re-resolve so a rebuilt app container's new IP is
    # picked up without restarting nginx (fastcgi_pass via variable defers
    # resolution to request time instead of caching the IP at startup).
    resolver 127.0.0.11 valid=10s ipv6=off;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        set $upstream app:9000;
        fastcgi_pass $upstream;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
